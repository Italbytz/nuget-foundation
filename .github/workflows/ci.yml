name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore solution
        run: dotnet restore nuget-foundation.sln

      - name: Build solution
        run: dotnet build nuget-foundation.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test nuget-foundation.sln --configuration Release --no-build --verbosity minimal

      - name: Pack packages
        run: dotnet pack nuget-foundation.sln --configuration Release --no-build --verbosity minimal --output ./artifacts/packages

      - name: Build docfx site
        run: dotnet tool run docfx docfx/docfx.json

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg
          if-no-files-found: error

      - name: Setup Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docfx/_site

  deploy-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build-test-pack
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
